<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ik-proof</title>
<style>
  html, body { margin: 0; height: 100%; background: #15171c; overflow: hidden; }
  #verdict { position: absolute; top: 8px; left: 10px; color: #cde; white-space: pre;
             font: 13px/1.45 monospace; background: rgba(0,0,0,.65);
             padding: 7px 10px; border-radius: 4px; }
</style>
</head>
<body>
<div id="verdict">loading…</div>
<script type="importmap">{ "imports": {
  "three": "./vendor/three.module.js",
  "three/examples/jsm/loaders/STLLoader.js": "./vendor/STLLoader.js",
  "three/examples/jsm/loaders/ColladaLoader.js": "./vendor/ColladaLoader.js"
} }</script>
<script type="module">
// One-off E2E proof: feed an IK shape trajectory through the SAME renderer
// the GUI uses (vendored three.js + urdf-loader), read the end-effector world
// position straight from the three.js scene graph, and verify it matches the
// pinocchio FK that produced the trajectory.
import * as THREE from 'three';
import URDFLoader from './vendor/URDFLoader.js';
import { STLLoader } from './vendor/STLLoader.js';

const params = new URLSearchParams(location.search);
const trajId = params.get('traj') || 'so101_circle-30mm';
const frameParam = params.get('frame');  // trajectory frame index; default = last
const verdictEl = document.getElementById('verdict');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15171c);
const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.01, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const dl = new THREE.DirectionalLight(0xffffff, 1.0);
dl.position.set(1, 2, 1.5);
scene.add(dl);
scene.add(new THREE.GridHelper(1, 20, 0x404040, 0x282828));

let _frames = 0;
(function loop() { renderer.render(scene, camera); if (++_frames < 30) requestAnimationFrame(loop); })();

// URDF Z-up -> three.js Y-up is robot.rotation.x = -90deg (as in urdf_viz.html),
// which maps a URDF point (x,y,z) to three world (x, z, -y).
const urdfToThree = (p) => new THREE.Vector3(p[0], p[2], -p[1]);

async function main() {
  const traj = await (await fetch(`traj_${trajId}.json`)).json();

  const loader = new URDFLoader();
  loader.loadMeshCb = (path, manager, done) => {
    new STLLoader(manager).load(
      path,
      (geom) => { geom.computeVertexNormals();
        done(new THREE.Mesh(geom, new THREE.MeshPhongMaterial({ color: 0xc8c8d0 }))); },
      undefined,
      () => done(null),
    );
  };

  loader.load(traj.urdf, (robot) => {
    if (!robot) { verdictEl.textContent = 'URDF failed to load'; return; }
    for (const j in robot.joints) robot.joints[j].ignoreLimits = true;
    robot.rotation.x = -Math.PI / 2;
    scene.add(robot);

    // Play the IK trajectory; record the rendered EE world position per frame.
    const eeWorld = [];
    const tmp = new THREE.Vector3();
    for (const frame of traj.frames) {
      for (const [name, rad] of Object.entries(frame)) {
        if (robot.joints[name]) robot.joints[name].setJointValue(rad);
      }
      robot.updateMatrixWorld(true);
      robot.links[traj.ee_link].getWorldPosition(tmp);
      eeWorld.push(tmp.clone());
    }

    // Pose the arm at the requested trajectory frame (default: last).
    const n = eeWorld.length;
    const K = frameParam === null ? n - 1 : Math.max(0, Math.min(parseInt(frameParam, 10), n - 1));
    for (const [name, rad] of Object.entries(traj.frames[K])) {
      if (robot.joints[name]) robot.joints[name].setJointValue(rad);
    }
    robot.updateMatrixWorld(true);

    // Draw the EE trail up to the current frame, on top of the arm meshes.
    const sphere = new THREE.SphereGeometry(0.005, 12, 12);
    eeWorld.slice(0, K + 1).forEach((p, i) => {
      const m = new THREE.Mesh(sphere, new THREE.MeshBasicMaterial(
        { color: i === 0 ? 0xffd23f : 0x46d6ff, depthTest: false }));
      m.position.copy(p);
      m.renderOrder = 999;
      scene.add(m);
    });

    // Planarity: the shapes lie in the URDF XY plane (constant URDF z) -> in
    // three.js a constant-Y plane, so out-of-plane = spread of world Y.
    const c = new THREE.Vector3();
    eeWorld.forEach((p) => c.add(p));
    c.multiplyScalar(1 / n);
    const planar = Math.max(...eeWorld.map((p) => Math.abs(p.y - c.y)));

    // Cross-check: the three.js-rendered EE must match the pinocchio FK that
    // produced the trajectory. This is the end-to-end link.
    let fkErr = 0;
    for (let i = 0; i < n; i++) {
      fkErr = Math.max(fkErr, urdfToThree(traj.fk_ee[i]).distanceTo(eeWorld[i]));
    }

    const pass = fkErr < 5e-4 && planar < 3e-3;
    verdictEl.textContent =
      `robot      ${traj.robot}\n` +
      `shape      ${traj.shape}\n` +
      `frames     ${n}\n` +
      `planarity  ${(planar * 1000).toFixed(3)} mm\n` +
      `three.js vs pinocchio FK  max ${(fkErr * 1000).toFixed(4)} mm\n` +
      `VERDICT    ${pass ? 'PASS — renderer reproduces the IK trace' : 'FAIL'}`;
    document.title = `ikproof ${trajId} ${pass ? 'PASS' : 'FAIL'}`;

    // Frame the camera on the whole arm (robot base -> EE trail).
    const box = new THREE.Box3();
    [new THREE.Vector3(), ...eeWorld].forEach((p) => box.expandByPoint(p));
    const boxC = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(...box.getSize(new THREE.Vector3()).toArray());
    const dir = new THREE.Vector3(0.3, 0.8, 0.95).normalize();
    camera.position.copy(boxC).addScaledVector(dir, maxDim * 1.7 + 0.15);
    camera.lookAt(boxC);
    window.__harnessDone = true;
  });
}
main();
</script>
</body>
</html>
