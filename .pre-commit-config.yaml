default_language_version:
    python: python3.12

exclude: "tests/artifacts/.*\\.safetensors$"

repos:
  ##### Meta #####
  - repo: meta
    hooks:
      - id: check-useless-excludes
      - id: check-hooks-apply

   ##### General Code Quality & Formatting #####
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1024']
        # Vendored third-party browser libs (three.js, urdf-loader) ship as
        # single large bundles — see static/vendor/PROVENANCE.md.
        exclude: ^src/lerobot/gui/static/vendor/
      - id: debug-statements
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/adhtruong/mirrors-typos
    rev: v1.38.1
    hooks:
      - id: typos
        args: [--force-exclude]
        # Vendored third-party browser libs — not our source to spell-check.
        exclude: ^src/lerobot/gui/static/vendor/

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.0
    hooks:
    -   id: pyupgrade
        args: [--py312-plus]

  ##### Markdown Quality #####
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.6.2
    hooks:
      - id: prettier
        name: Format Markdown with Prettier
        types_or: [markdown, mdx]
        args: [--prose-wrap=preserve]

  ##### Security #####
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.15.2
    hooks:
      - id: zizmor

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
    - id: bandit
      args: ["-c", "pyproject.toml"]
      additional_dependencies: ["bandit[toml]"]

  ##### Local: destructive-op annotations #####
  - repo: local
    hooks:
      - id: no-silent-destruct
        name: Flag destructive filesystem ops without justification
        entry: scripts/lint/no_silent_destruct.py
        language: python
        files: ^(src|scripts)/.*\.py$
        pass_filenames: true

  # TODO(Steven): Uncomment when ready to use
  ##### Static Analysis & Typing #####
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        # Run on the full project so mypy can resolve cross-file types (parent
        # Camera class, etc.). pass_filenames: true splits the staged set across
        # multiple invocations and breaks import resolution. We pass src/lerobot
        # explicitly because pass_filenames: false otherwise leaves mypy with no
        # target argument.
        args: [--config-file=pyproject.toml, src/lerobot]
        pass_filenames: false

  ##### Docstring Checks #####
