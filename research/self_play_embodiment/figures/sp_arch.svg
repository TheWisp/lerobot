<text x="42" y="716" font-size="12.5" fill="#6B7280">Result: +14.3 pts grasp-SR in-distribution (3 training seeds × 96 eval seeds, ≈3.5σ) and ahead at every out-of-distribution spawn widening vs the no-world-model control. Without self-play in the corpus, the same mechanism is neutral.</text>
