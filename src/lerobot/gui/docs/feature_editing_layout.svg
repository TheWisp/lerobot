  <text class="muted" x="974" y="270" font-size="11">range min/max: −0.21 / −0.04</text>
  <rect class="slider-track" x="974" y="282" width="190" height="6"/>
  <circle class="slider-thumb" cx="1029" cy="285" r="6"/>
  <text class="muted" x="974" y="304" font-size="9">−1.0</text>
  <text class="muted" x="1148" y="304" font-size="9">0.0</text>
  <rect class="btn" x="1172" y="278" width="92" height="22"/>
  <text class="label" x="1185" y="294" font-size="12">−0.10</text>

  <!-- success card -->
  <text class="muted" x="974" y="332" font-size="11">success</text>
  <text class="muted" x="1226" y="332" font-size="11">bool[1]</text>
  <text class="muted" x="974" y="350" font-size="11">range value: false (uniform)</text>
  <rect class="chip" x="974" y="358" width="20" height="20"/>
  <text class="muted" x="1002" y="374">unchecked  ›  set ✓ for range</text>

  <!-- action card (read-only) -->
  <text class="muted" x="974" y="408" font-size="11">action</text>
  <text class="readonly-tag" x="1166" y="408">read-only · float32[14]</text>
  <text class="muted" x="974" y="425" font-size="11" font-style="italic">recorded data — not editable in V1</text>

  <!-- observation.state card (read-only) -->
  <text class="muted" x="974" y="452" font-size="11">observation.state</text>
  <text class="readonly-tag" x="1170" y="452">read-only · float32[14]</text>

  <line x1="974" y1="488" x2="1262" y2="488" stroke="#cfcfcf"/>

  <text class="muted" x="974" y="508" font-size="11">Edits stage automatically as you change a card.</text>
  <text class="muted" x="974" y="524" font-size="11">Review &amp; commit in Pending edits below.</text>
