<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <style>
    .label { fill: #222; }
    .muted { fill: #666; }
    .deferred { fill: #999; }
    .frame { fill: #fafafa; stroke: #444; stroke-width: 1.5; }
    .panel { fill: #f3f3f3; stroke: #888; stroke-width: 1; }
    .panel-sidebar { fill: #ededed; stroke: #888; stroke-width: 1; }
    .placeholder { fill: #d8d8d8; stroke: #666; stroke-width: 1; }
    .placeholder-deferred { fill: none; stroke: #999; stroke-width: 1.5; stroke-dasharray: 6 4; }
    .row-bg { fill: #fff; stroke: #cfcfcf; stroke-width: 1; }
    .row-bg-readonly { fill: #f6f6f6; stroke: #cfcfcf; stroke-width: 1; }
    .row-bg-dim { fill: #ededed; stroke: #cfcfcf; stroke-width: 1; }
    .trim-envelope { fill: #cfe0fb; fill-opacity: 0.30; stroke: #5b8def; stroke-width: 1; stroke-dasharray: 4 3; }
    .trim-handle { fill: #5b8def; stroke: #3a6fd6; stroke-width: 1; }
    .selection-slice { fill: #ffd966; fill-opacity: 0.45; stroke: #b58900; stroke-width: 1.4; }
    .selection-handle { fill: #b58900; }
    .playhead { stroke: #cc0000; stroke-width: 1.4; }
    .seg-a { fill: #b3d9ff; stroke: #5b8def; stroke-width: 0.8; }
    .seg-b { fill: #ffd6c2; stroke: #d97757; stroke-width: 0.8; }
    .seg-c { fill: #c2e8c2; stroke: #4caf50; stroke-width: 0.8; }
    .reward-line { fill: none; stroke: #5b8def; stroke-width: 1.6; }
    .bool-on { fill: #c2e8c2; stroke: #4caf50; stroke-width: 0.8; }
    .bool-off { fill: #f0f0f0; stroke: #cfcfcf; stroke-width: 0.8; }
    .chip { fill: #fff; stroke: #888; stroke-width: 1; rx: 4; }
    .chip-detail { fill: #fafafa; stroke: #d0d0d0; stroke-width: 0.8; rx: 3; }
    .btn { fill: #fff; stroke: #444; stroke-width: 1; rx: 4; }
    .btn-disabled { fill: #f0f0f0; stroke: #bbb; stroke-width: 1; rx: 4; }
    .btn-primary { fill: #5b8def; stroke: #3a6fd6; stroke-width: 1; rx: 4; }
    .btn-primary-text { fill: #fff; }
    .btn-toggle-on { fill: #fff3c4; stroke: #b58900; stroke-width: 1; rx: 4; }
    .annot { fill: #b58900; font-size: 11px; }
    .section-title { font-weight: 600; font-size: 13px; fill: #222; }
    .axis-tick { stroke: #aaa; stroke-width: 0.5; }
    .axis-label { fill: #888; font-size: 10px; }
    .axis-line { stroke: #888; stroke-width: 1.2; }
    .scroll-thumb { fill: #c0c0c0; stroke: #999; stroke-width: 0.5; rx: 3; }
    .scroll-track { fill: #ececec; stroke: none; }
    .focus-ring { fill: none; stroke: #b58900; stroke-width: 1.6; rx: 4; }
    .resize-handle { fill: #d0d0d0; stroke: #999; stroke-width: 0.8; }
    .slider-track { fill: #d8d8d8; stroke: #aaa; stroke-width: 0.5; rx: 2; }
    .slider-thumb { fill: #5b8def; stroke: #3a6fd6; stroke-width: 1; }
    .readonly-tag { fill: #999; font-size: 10px; font-style: italic; }
    .tab { fill: #f0f0f0; stroke: #888; stroke-width: 1; rx: 0; }
    .tab-active { fill: #fff; stroke: #444; stroke-width: 1.5; rx: 0; }
    .tree-row { fill: none; }
    .tree-row-active { fill: #fff3c4; stroke: #b58900; stroke-width: 0.8; }
  </style>

  <!-- Outer frame -->
  <rect class="frame" x="6" y="6" width="1268" height="748" rx="6"/>

  <!-- ============ TOP TAB BAR ============ -->
  <rect class="panel" x="6" y="6" width="1268" height="32" rx="0"/>
  <rect class="tab-active" x="14" y="10" width="76" height="28"/>
  <text class="label" x="35" y="29" font-weight="600">Data</text>
  <rect class="tab" x="92" y="10" width="76" height="28"/>
  <text class="muted" x="116" y="29">Model</text>
  <rect class="tab" x="170" y="10" width="76" height="28"/>
  <text class="muted" x="195" y="29">Run</text>
  <rect class="tab" x="248" y="10" width="76" height="28"/>
  <text class="muted" x="272" y="29">Robot</text>

  <!-- ============ LEFT SIDEBAR (data tree) ============ -->
  <rect class="panel-sidebar" x="6" y="38" width="180" height="716"/>
  <text class="section-title" x="16" y="58">Datasets</text>

  <!-- Sources subtitle -->
  <text class="muted" x="16" y="78" font-size="11">Sources</text>
  <text class="muted" x="160" y="78" font-size="13">+</text>
  <text class="muted" x="20" y="94" font-size="11">▾ ~/Documents/lerobot</text>
  <text class="muted" x="20" y="110" font-size="11">▸ ~/.cache/huggingface</text>

  <line x1="14" y1="120" x2="178" y2="120" stroke="#cfcfcf"/>

  <!-- Open datasets list -->
  <text class="muted" x="16" y="140" font-size="11">Open</text>
  <rect class="tree-row-active" x="10" y="148" width="172" height="22"/>
  <text class="label" x="20" y="163" font-size="11" font-weight="600">▾ my_dataset</text>
  <text class="muted" x="20" y="180" font-size="10.5">  ep 0 · 385 frames</text>
  <text class="muted" x="20" y="194" font-size="10.5">  ep 1 · 412 frames</text>
  <text class="muted" x="20" y="208" font-size="10.5">  ep 2 · 348 frames</text>
  <text class="muted" x="20" y="222" font-size="10.5">  …</text>
  <text class="muted" x="20" y="246" font-size="11">▸ thewisp/intervention…</text>
  <text class="muted" x="20" y="266" font-size="11">▸ jadechoghari/collect-fr…</text>

  <text class="annot" x="14" y="298" font-size="10">open a dataset to see its</text>
  <text class="annot" x="14" y="312" font-size="10">schema (row labels + Inspector)</text>

  <!-- Resize handle: between Sidebar and Main -->
  <rect class="resize-handle" x="186" y="38" width="4" height="716" rx="1.5"/>
  <line x1="188" y1="382" x2="188" y2="410" stroke="#888" stroke-width="0.8"/>

  <!-- ============ MAIN PANEL (cameras + timeline + edits bar) ============ -->

  <!-- Cameras row -->
  <rect class="placeholder" x="200" y="48" width="220" height="220"/>
  <text class="label" x="210" y="68">Cam 1</text>
  <text class="muted" x="210" y="83" font-size="11">observation.images.front</text>

  <rect class="placeholder" x="430" y="48" width="220" height="220"/>
  <text class="label" x="440" y="68">Cam 2</text>
  <text class="muted" x="440" y="83" font-size="11">observation.images.top</text>

  <rect class="placeholder-deferred" x="660" y="48" width="282" height="220"/>
  <text class="deferred" x="700" y="155" font-size="14">URDF / 3D trajectory</text>
  <text class="deferred" x="755" y="172" font-size="11" font-style="italic">(deferred — Phase C)</text>

  <!-- Resize handle: horizontal, between cameras and timeline -->
  <rect class="resize-handle" x="200" y="276" width="744" height="4" rx="1.5"/>
  <line x1="556" y1="277" x2="588" y2="277" stroke="#888" stroke-width="0.8"/>

  <!-- Timeline section header — existing transport controls (Play / Speed / Frame / Time / Reset) -->
  <text class="section-title" x="200" y="300">Timeline</text>

  <!-- Play button -->
  <rect class="btn" x="262" y="287" width="56" height="20"/>
  <text class="muted" x="278" y="301" font-size="11">▶ Play</text>

  <!-- Speed select dropdown -->
  <rect class="btn" x="324" y="287" width="58" height="20"/>
  <text class="muted" x="334" y="301" font-size="11">1x ▾</text>

  <!-- Frame info -->
  <text class="muted" x="396" y="301" font-size="11">frame 247 / 385</text>

  <!-- Time info -->
  <text class="muted" x="496" y="301" font-size="11">0:08 / 0:12</text>

  <!-- Reset trim -->
  <rect class="btn" x="580" y="287" width="68" height="20"/>
  <text class="muted" x="592" y="301" font-size="11">Reset trim</text>

  <!-- Status -->
  <text class="muted" x="660" y="301" font-size="11" font-style="italic">Ready</text>

  <!-- Time axis with trim handles (no separate "trim" row) -->
  <line class="axis-line" x1="290" y1="320" x2="940" y2="320"/>
  <g class="axis-tick">
    <line x1="290" y1="316" x2="290" y2="324"/>
    <line x1="383" y1="316" x2="383" y2="324"/>
    <line x1="476" y1="316" x2="476" y2="324"/>
    <line x1="569" y1="316" x2="569" y2="324"/>
    <line x1="662" y1="316" x2="662" y2="324"/>
    <line x1="755" y1="316" x2="755" y2="324"/>
    <line x1="848" y1="316" x2="848" y2="324"/>
    <line x1="940" y1="316" x2="940" y2="324"/>
  </g>
  <g class="axis-label">
    <text x="284" y="312">0</text>
    <text x="372" y="312">50</text>
    <text x="463" y="312">100</text>
    <text x="556" y="312">150</text>
    <text x="649" y="312">200</text>
    <text x="742" y="312">250</text>
    <text x="835" y="312">300</text>
    <text x="924" y="312">350</text>
  </g>

  <!-- Trim envelope: extends DOWN through all feature rows -->
