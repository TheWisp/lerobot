  <rect class="trim-handle" x="316" y="312" width="8" height="22" rx="2"/>
  <rect class="trim-handle" x="916" y="312" width="8" height="22" rx="2"/>

  <text class="annot" x="500" y="338">trim handles on time axis · envelope through all feature rows</text>

  <!-- Subtask row -->
