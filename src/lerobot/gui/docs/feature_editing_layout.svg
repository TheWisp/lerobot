  <rect class="row-bg-dim" x="290" y="462" width="30" height="22"/>
  <rect class="row-bg-dim" x="920" y="462" width="20" height="22"/>
  <text class="muted" x="350" y="477" font-size="11" font-style="italic">collapsed — click to expand (read-only)</text>

  <text class="muted" x="200" y="513" font-size="10" font-style="italic">…6 features hidden (pin to show, or scroll)</text>

  <!-- Scrollbar in timeline section -->
  <rect class="scroll-track" x="945" y="348" width="6" height="160" rx="3"/>
  <rect class="scroll-thumb" x="945" y="348" width="6" height="80"/>

  <!-- Vertical selection slice -->
  <rect class="selection-slice" x="463" y="348" width="19" height="146"/>
  <rect class="selection-handle" x="461" y="344" width="4" height="154"/>
  <rect class="selection-handle" x="481" y="344" width="4" height="154"/>
  <text class="annot" x="431" y="340">[from=120</text>
  <text class="annot" x="479" y="340">to=130)</text>

  <!-- Playhead -->
  <line class="playhead" x1="601" y1="316" x2="601" y2="494"/>
  <polygon class="playhead" fill="#cc0000" points="597,314 605,314 601,320"/>

  <!-- Edits bar separator -->
  <line x1="200" y1="540" x2="952" y2="540" stroke="#888" stroke-width="1.5"/>
  <text class="section-title" x="200" y="558">Pending edits (50)</text>

  <!-- "Show pending edits" toggle -->
  <rect class="btn-toggle-on" x="360" y="546" width="180" height="22"/>
  <text class="muted" x="375" y="561" font-size="11">Show pending edits · ON</text>

  <!-- Group 1: subtask · ep 0 (3 edits, expanded) -->
  <text class="muted" x="200" y="585" font-size="11">▾</text>
  <rect class="chip" x="214" y="572" width="240" height="22"/>
  <text font-size="11" x="224" y="587">subtask · ep 0 (3)</text>
  <text class="muted" x="440" y="588" font-size="13">×</text>

  <rect class="chip-detail" x="230" y="598" width="244" height="20"/>
  <text font-size="11" x="240" y="612" fill="#444">120…129  →  "reach handle"</text>
  <rect class="chip-detail" x="230" y="620" width="244" height="20"/>
  <text font-size="11" x="240" y="634" fill="#444">200…211  →  "grasp"</text>
  <rect class="chip-detail" x="230" y="642" width="244" height="20"/>
  <text font-size="11" x="240" y="656" fill="#444">240…259  →  "lift"</text>

  <!-- Group 2: reward · ep 0 (47 edits, collapsed) -->
  <text class="muted" x="490" y="585" font-size="11">▸</text>
  <rect class="chip" x="504" y="572" width="240" height="22"/>
  <text font-size="11" x="514" y="587">reward · ep 0 (47)</text>
  <text class="muted" x="730" y="588" font-size="13">×</text>

  <!-- Discard / Save -->
  <rect class="btn" x="760" y="568" width="92" height="28"/>
  <text x="785" y="587">Discard</text>
  <rect class="btn-primary" x="858" y="568" width="92" height="28"/>
  <text class="btn-primary-text" x="887" y="587" font-weight="600">Save</text>

  <!-- Resize handle: vertical, between Main and Inspector -->
  <rect class="resize-handle" x="956" y="38" width="6" height="716" rx="2"/>
  <line x1="959" y1="382" x2="959" y2="410" stroke="#888" stroke-width="0.8"/>

  <!-- ============ PROPS / INSPECTOR (right sidebar, full height, always visible) ============ -->

  <rect class="panel" x="962" y="38" width="312" height="716"/>
