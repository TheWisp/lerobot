  <text class="muted" x="974" y="132" font-size="11">10 frames · drag-select on any row</text>

  <line x1="974" y1="144" x2="1262" y2="144" stroke="#cfcfcf"/>

  <!-- subtask card (focused — origin row, has pending edit) -->
