  <rect class="row-bg" x="290" y="388" width="650" height="34"/>
  <rect class="row-bg-dim" x="290" y="388" width="30" height="34"/>
  <rect class="row-bg-dim" x="920" y="388" width="20" height="34"/>
  <polyline class="reward-line"
    points="320,414 340,412 360,408 380,406 400,410 420,412 440,412 460,408 480,404 500,402 520,403 540,406 560,408 580,405 600,402 620,398 640,394 660,394 680,397 700,400 720,401 740,404 760,406 780,406 800,408 820,406 840,402 860,400 880,402 900,406 920,410"/>

  <!-- Success row -->
  <text class="label" x="200" y="446" font-size="12">success</text>
  <text class="muted" x="200" y="459" font-size="10">bool[1] · editable</text>
  <rect class="row-bg" x="290" y="428" width="650" height="22"/>
  <rect class="row-bg-dim" x="290" y="428" width="30" height="22"/>
  <rect class="row-bg-dim" x="920" y="428" width="20" height="22"/>
  <rect class="bool-off" x="320" y="430" width="560" height="18"/>
  <rect class="bool-on" x="880" y="430" width="40" height="18"/>

