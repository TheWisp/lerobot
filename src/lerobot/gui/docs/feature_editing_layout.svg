  <rect x="14" y="586" width="170" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="20" y="600" font-size="10" fill="#1e40af">reward · ep1 · 240…339 ✕</text>
  <rect x="190" y="586" width="170" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="196" y="600" font-size="10" fill="#1e40af">subtask · ep1 · 240…339 ✕</text>
  <rect x="366" y="586" width="140" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.5"/>
