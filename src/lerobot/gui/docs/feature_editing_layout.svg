  <rect class="row-bg" x="290" y="348" width="650" height="34"/>
  <rect class="row-bg-dim" x="290" y="348" width="30" height="34"/>
  <rect class="row-bg-dim" x="920" y="348" width="20" height="34"/>

  <rect class="seg-a" x="320" y="352" width="120" height="26"/>
  <text font-size="11" x="335" y="369">approach</text>
  <rect class="seg-b" x="440" y="352" width="106" height="26"/>
  <text font-size="11" x="450" y="369">reach handle</text>
  <rect class="seg-c" x="546" y="352" width="194" height="26"/>
  <text font-size="11" x="595" y="369">grasp + lift</text>
  <rect class="seg-a" x="740" y="352" width="90" height="26"/>
