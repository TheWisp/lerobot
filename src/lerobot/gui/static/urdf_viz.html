<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URDF state visualization</title>
<style>
  html, body { margin: 0; height: 100%; background: #1a1a1a; overflow: hidden; }
  /* top-right — aligns with the per-camera performance overlay; the run.js
     tile label sits top-left, so this clears it too */
  #status { position: absolute; top: 4px; right: 6px; color: #9cf; font-size: 11px;
            font-family: monospace; background: rgba(0,0,0,0.6); padding: 1px 5px;
            border-radius: 3px; pointer-events: none; }
  /* bottom-right ghost toggle. Pointer-events on so it's clickable; everything
     else in the page is the orbit-controls canvas. */
  /* Outlined-when-off, filled-when-on — the standard Material/Tailwind/
     Bootstrap toggle-button pattern. The cyan border in the off state is
     what tells the user "this is a control", and switching from outlined
     to filled is the on-state signal. No reserved-space-for-an-icon
     awkwardness, and the fill change is a strong non-text signal. */
  #ghost-toggle { position: absolute; bottom: 6px; right: 6px;
                  font-size: 11px; font-family: monospace;
                  color: #4dd0ff; background: rgba(10, 22, 34, 0.7);
                  padding: 4px 10px; border-radius: 12px;
                  border: 1px solid #4dd0ff; cursor: pointer; user-select: none;
                  letter-spacing: 0.02em;
                  transition: background 0.1s, color 0.1s; }
  #ghost-toggle:hover { background: rgba(77, 208, 255, 0.18); }
  #ghost-toggle.on { color: #0a1622; background: #4dd0ff; font-weight: 600; }
  #ghost-toggle.on:hover { background: #7be0ff; }
  #ghost-toggle:focus-visible { outline: 2px solid #4dd0ff; outline-offset: 1px; }
</style>
</head>
<body>
<div id="status">starting…</div>
<button id="ghost-toggle" title="Overlay the commanded action as a translucent robot on top of the recorded state">show action</button>
<script type="importmap">
{
  "imports": {
    "three": "/static/vendor/three.module.js",
    "three/examples/jsm/loaders/STLLoader.js": "/static/vendor/STLLoader.js",
    "three/examples/jsm/loaders/ColladaLoader.js": "/static/vendor/ColladaLoader.js",
    "urdf-loader": "/static/vendor/URDFLoader.js"
  }
}
</script>
<script type="module">
// Thin renderer with two drivers:
//   - mode=live (default): polls /api/run/urdf-viz at 30 Hz; the response
//     carries `state` (solid robot) and optionally `action` (ghost overlay).
//   - mode=dataset: parent posts {type:'frame', dataset, episode, frame};
//     we fetch /api/datasets/{id}/episodes/{ep}/urdf-viz?frame=N.
// Either way the response shape is the same and the renderer doesn't care
// where the angles came from.
import * as THREE from 'three';
import { OrbitControls } from '/static/vendor/OrbitControls.js';
import { STLLoader } from '/static/vendor/STLLoader.js';
import URDFLoader from 'urdf-loader';

const PARAMS = new URLSearchParams(location.search);
const MODE = PARAMS.get('mode') || 'live';  // 'live' | 'dataset'
let _ghostOn = PARAMS.get('ghost') === 'on';
const LIVE_ENDPOINT = '/api/run/urdf-viz';
const datasetEndpoint = (ds, ep, frame) =>
  `/api/datasets/${encodeURIComponent(ds)}/episodes/${ep}/urdf-viz?frame=${frame}`;
const BIMANUAL_X = 0.165;  // half the physical center-to-center arm spacing
const STATE_COLOR = 0xe0b020;
const GHOST_COLOR = 0x4dd0ff;
const setStatus = (m) => { document.getElementById('status').textContent = m; };

// ── three.js scene ────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
camera.position.set(0.55, 0.4, 0.55);
const renderer = new THREE.WebGLRenderer({ antialias: true });
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dl = new THREE.DirectionalLight(0xffffff, 1.0);
dl.position.set(1, 2, 1);
scene.add(dl);
scene.add(new THREE.GridHelper(1, 20, 0x444444, 0x2a2a2a));
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.15, 0);

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// _polls counts updates applied in the last second — drives the status readout.
let _polls = 0, _label = '';
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── one arm = solid (state) + optional ghost (action). Ghost is lazily
//    loaded on first toggle-on so we don't pay STL parse + scene cost for
//    users who never enable the overlay. ─────────────────────────────────
function _loadRobot(urdfUrl, baseX, color, opts = {}) {
  const transparent = !!opts.transparent;
  const matOpts = { color };
  if (transparent) {
    matOpts.transparent = true;
    matOpts.opacity = 0.45;
    // depthWrite=false stops the ghost from occluding itself when two of
    // its own links overlap from the camera's angle.
    matOpts.depthWrite = false;
  }
  const mat = new THREE.MeshPhongMaterial(matOpts);
  return new Promise((resolve, reject) => {
    const loader = new URDFLoader();
    loader.loadMeshCb = (path, manager, done) => {
      new STLLoader(manager).load(
        path,
        (geom) => {
          geom.computeVertexNormals();
          const mesh = new THREE.Mesh(geom, mat);
          // URDFLoader's done-callback synchronously overwrites our material
          // with the URDF <material> spec (usually a default gray). Re-apply
          // ours immediately so the state vs action robots stay distinct.
          done(mesh);
          mesh.material = mat;
          if (transparent) mesh.renderOrder = 1;
        },
        undefined,
        () => done(null),
      );
    };
    loader.load(urdfUrl, (robot) => {
      if (!robot) { reject(new Error('URDF failed to load: ' + urdfUrl)); return; }
      // urdf-loader clamps setJointValue to the URDF <limit> by default;
      // the calibration offsets legitimately exceed the CAD limits.
      for (const name in robot.joints) robot.joints[name].ignoreLimits = true;
      robot.rotation.x = -Math.PI / 2;  // URDF Z-up -> three.js Y-up
      robot.position.x = baseX;
      scene.add(robot);
      resolve(robot);
    });
  });
}

// One entry per arm: {prefix, baseX, state: URDFRobot, ghost: URDFRobot | null}
let _arms = [];
let _urdfUrl = null;

async function _ensureGhost(armEntry) {
  if (armEntry.ghost) return;
  // Cache the in-flight load promise so concurrent calls (e.g. the toggle
  // click overlapping with the init's apply) share one URDFLoader run
  // rather than racing and orphaning a duplicate ghost in the scene.
  if (!armEntry._ghostLoading) {
    armEntry._ghostLoading = _loadRobot(_urdfUrl, armEntry.baseX, GHOST_COLOR, { transparent: true })
      .then((robot) => { armEntry.ghost = robot; return robot; });
  }
  await armEntry._ghostLoading;
  // Re-apply the last action angles if we have them cached, so the ghost
  // doesn't flash at home pose on first show.
  if (armEntry._lastAction) _applyAngles(armEntry.ghost, armEntry._lastAction);
}

function _setGhostVisible(visible) {
  for (const arm of _arms) {
    if (arm.ghost) arm.ghost.visible = visible;
  }
}

function _applyAngles(robot, angles) {
  if (!robot) return;
  for (const [joint, rad] of Object.entries(angles)) {
    if (robot.joints[joint]) robot.joints[joint].setJointValue(rad);
  }
}

async function _applyResponse(data) {
  if (!data || !data.available || _arms.length !== data.arms.length) return;
  let hadAction = false;
  for (let i = 0; i < data.arms.length; i++) {
    const arm = _arms[i];
    const armData = data.arms[i];
    if (armData.state) _applyAngles(arm.state, armData.state);
    if (armData.action) {
      hadAction = true;
      arm._lastAction = armData.action;
      if (_ghostOn) {
        await _ensureGhost(arm);
        _applyAngles(arm.ghost, armData.action);
      }
    }
  }
  // Hide the toggle when this driver can't supply action — keeps the UI
  // honest when e.g. the run never wrote actions, or the dataset has no
  // `action` feature.
  document.getElementById('ghost-toggle').style.display = hadAction ? '' : 'none';
  _polls++;
}

// ── driver: live (poll) ───────────────────────────────────────────────────
async function _pollLive() {
  try {
    const r = await fetch(LIVE_ENDPOINT);
    await _applyResponse(await r.json());
  } catch (e) { /* transient — keep the last pose */ }
  setTimeout(_pollLive, 33);  // ~30 Hz, matches the observation rate
}

// ── driver: dataset (postMessage-driven) ──────────────────────────────────
let _datasetCtx = null;  // {dataset, episode}
let _pendingFrame = null;
let _fetchInflight = false;

async function _fetchDatasetFrame(frame) {
  if (!_datasetCtx) return;
  try {
    const r = await fetch(datasetEndpoint(_datasetCtx.dataset, _datasetCtx.episode, frame));
    await _applyResponse(await r.json());
  } catch (e) { /* transient */ }
}

async function _drainDataset() {
  if (_fetchInflight || _pendingFrame === null) return;
  _fetchInflight = true;
  while (_pendingFrame !== null) {
    const f = _pendingFrame;
    _pendingFrame = null;
    await _fetchDatasetFrame(f);
  }
  _fetchInflight = false;
}

window.addEventListener('message', (e) => {
  const msg = e.data;
  if (!msg || typeof msg !== 'object') return;
  if (msg.type === 'frame') {
    if (!_datasetCtx || _datasetCtx.dataset !== msg.dataset || _datasetCtx.episode !== msg.episode) {
      _datasetCtx = { dataset: msg.dataset, episode: msg.episode };
    }
    _pendingFrame = msg.frame;
    _drainDataset();
  }
});

// ── ghost toggle ──────────────────────────────────────────────────────────
const ghostBtn = document.getElementById('ghost-toggle');
function _updateGhostBtn() {
  // State signal is the .on class — CSS swaps colors + fills the indicator
  // dot. The label text stays static so the control reads as one button
  // (not as a status badge whose text changes).
  ghostBtn.classList.toggle('on', _ghostOn);
}
_updateGhostBtn();
ghostBtn.addEventListener('click', async () => {
  _ghostOn = !_ghostOn;
  _updateGhostBtn();
  if (_ghostOn) {
    for (const arm of _arms) await _ensureGhost(arm);
  }
  _setGhostVisible(_ghostOn);
});

// ── init: probe one frame, build the scene, hand off to the driver ───────
async function _initialProbe() {
  if (MODE === 'live') {
    setStatus('waiting for a run…');
    for (let i = 0; i < 240; i++) {
      try {
        const r = await fetch(LIVE_ENDPOINT);
        const d = await r.json();
        if (d.available) return d;
      } catch (e) { /* not ready */ }
      await new Promise((res) => setTimeout(res, 500));
    }
    return null;
  }
  // dataset mode: we need the parent to tell us which (dataset, episode) and
  // an initial frame. Hold here until the first postMessage gives us context,
  // then probe frame 0.
  setStatus('waiting for dataset…');
  for (let i = 0; i < 240 && !_datasetCtx; i++) {
    await new Promise((res) => setTimeout(res, 100));
  }
  if (!_datasetCtx) return null;
  try {
    const r = await fetch(datasetEndpoint(_datasetCtx.dataset, _datasetCtx.episode, 0));
    const d = await r.json();
    return d.available ? d : null;
  } catch (e) { return null; }
}

async function init() {
  const data = await _initialProbe();
  if (!data) { setStatus('no robot to visualize'); return; }
  _urdfUrl = data.urdf;
  const baseXs = data.bimanual
    ? data.arms.map((a) => (a.prefix === 'left_' ? BIMANUAL_X : -BIMANUAL_X))
    : [0];
  for (let i = 0; i < data.arms.length; i++) {
    const arm = data.arms[i];
    const stateRobot = await _loadRobot(_urdfUrl, baseXs[i], STATE_COLOR);
    _arms.push({ prefix: arm.prefix, baseX: baseXs[i], state: stateRobot, ghost: null, _lastAction: null });
  }
  await _applyResponse(data);
  if (_ghostOn) {
    for (const arm of _arms) await _ensureGhost(arm);
    _setGhostVisible(true);
  }
  _label = (data.name || 'robot') + (data.bimanual ? ' (bimanual)' : '');
  setStatus(_label);
  if (MODE === 'live') {
    // Hz is a meaningful signal in live mode (dropped polls = stale obs).
    // In dataset mode we only refresh on scrubber moves, so steady-state
    // is genuinely 0 Hz and the readout would just be misleading noise.
    setInterval(() => {
      setStatus(`${_label} · ${_polls} Hz`);
      _polls = 0;
    }, 1000);
    _pollLive();
  }
  // dataset mode is event-driven — postMessage handler above does the work.
}

init();
</script>
</body>
</html>
