<!DOCTYPE html>
<html>
<head>
<title>LeRobot Quest VR teleop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: monospace; background: #111; color: #0f0; padding: 1em; font-size: 18px; }
  button { font-size: 22px; padding: 12px 24px; margin: 4px 8px 4px 0; }
  #stats { white-space: pre; margin-top: 1em; font-size: 16px; }
  #log { margin-top: 1em; max-height: 200px; overflow-y: scroll; font-size: 12px; color: #888; background: #000; padding: 8px; }
</style>
</head>
<body>
<h1>LeRobot Quest VR teleop</h1>
<div>
  <button id="connect">1. Connect</button>
  <button id="enterAR">2a. Enter AR (passthrough)</button>
  <button id="enterVR">2b. Enter VR (opaque)</button>
</div>
<div id="stats">disconnected</div>
<div id="log"></div>
<script>
const WS_URL = `wss://${location.hostname}:${location.port || 8443}/ws`;
const $ = id => document.getElementById(id);
const log = m => {
  const d = $("log");
  d.textContent = `[${(performance.now()/1000).toFixed(2)}s] ${m}\n` + d.textContent.split('\n').slice(0, 50).join('\n');
};

let ws = null, xrSession = null, refSpace = null;
let gl = null, xrCanvas = null;
let lastRTT = NaN, sentCount = 0;
let wantConnected = false, reconnectTimer = null;

function updateStats() {
  $("stats").textContent =
    `ws:    ${ws && ws.readyState === 1 ? 'open' : 'closed'}\n` +
    `XR:    ${xrSession ? 'active' : 'inactive'}\n` +
    `sent:  ${sentCount} frames\n` +
    `RTT:   ${isNaN(lastRTT) ? '—' : lastRTT.toFixed(1) + ' ms'}`;
}

function connect() {
  wantConnected = true;
  _openWS();
}

function _openWS() {
  if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { log("ws open"); updateStats(); };
  ws.onerror = e => log("ws error");
  ws.onclose = () => {
    log("ws closed");
    updateStats();
    if (wantConnected && !reconnectTimer) {
      reconnectTimer = setTimeout(() => { reconnectTimer = null; _openWS(); }, 1000);
    }
  };
  ws.onmessage = ev => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "ping") {
      ws.send(JSON.stringify({type: "pong", seq: msg.seq, t_pc_send: msg.t_pc_send}));
    } else if (msg.type === "rtt") {
      lastRTT = msg.ms;
      updateStats();
    }
  };
}

async function enterSession(mode) {
  if (!navigator.xr) { log("navigator.xr unavailable"); return; }
  const ok = await navigator.xr.isSessionSupported(mode);
  if (!ok) { log(mode + " not supported"); return; }
  try {
    xrCanvas = document.createElement("canvas");
    document.body.appendChild(xrCanvas);
    gl = xrCanvas.getContext("webgl", { xrCompatible: true });
    if (!gl) throw new Error("no webgl");
    xrSession = await navigator.xr.requestSession(mode);
    await xrSession.updateRenderState({ baseLayer: new XRWebGLLayer(xrSession, gl) });
    refSpace = await xrSession.requestReferenceSpace("local");
    xrSession.requestAnimationFrame(onXRFrame);
    xrSession.addEventListener("end", () => {
      xrSession = null;
      if (xrCanvas) { xrCanvas.remove(); xrCanvas = null; gl = null; }
      updateStats();
    });
    log(mode + " session started");
    updateStats();
  } catch (e) {
    log(mode + " failed: " + e.message);
  }
}

function onXRFrame(time, frame) {
  if (!xrSession) return;
  xrSession.requestAnimationFrame(onXRFrame);
  // Required: bind the XR framebuffer and clear (alpha=0 in AR for passthrough).
  const isAR = xrSession.environmentBlendMode !== "opaque";
  const layer = xrSession.renderState.baseLayer;
  if (gl && layer) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
    gl.clearColor(0, 0, 0, isAR ? 0 : 1);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  }
  if (!ws || ws.readyState !== 1) return;
  const poses = [];
  for (const src of frame.session.inputSources) {
    if (!src.gripSpace) continue;
    const pose = frame.getPose(src.gripSpace, refSpace);
    if (!pose) continue;
    const p = pose.transform.position, o = pose.transform.orientation;
    const buttons = src.gamepad ? src.gamepad.buttons.map(b => +b.value.toFixed(3)) : [];
    poses.push({
      hand: src.handedness,
      pos: [+p.x.toFixed(5), +p.y.toFixed(5), +p.z.toFixed(5)],
      rot: [+o.x.toFixed(5), +o.y.toFixed(5), +o.z.toFixed(5), +o.w.toFixed(5)],
      buttons,
    });
  }
  ws.send(JSON.stringify({
    type: "frame",
    t_quest_send: performance.now(),
    poses,
  }));
  sentCount++;
  if ((sentCount & 31) === 0) updateStats();
}

$("connect").onclick = connect;
$("enterAR").onclick = () => enterSession("immersive-ar");
$("enterVR").onclick = () => enterSession("immersive-vr");
updateStats();
</script>
</body>
</html>
